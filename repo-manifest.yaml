repo:
  name: akasha-instability
  ecosystem: akasha
  version: 0.1.0
  status: active

engine:
  family: pattern
  class: evaluation_engine
  role: instability_detection

identity:
  role: engine
  layer: evaluation
  description: >
    Instability detection engine for the Akasha constellation.
    Responsible for identifying volatile structures, oscillating relationships,
    fragile states, and emerging breakdown conditions across the system.

ownership:
  steward: human
  approval_required: true

interfaces:
  consumes:
    - event_records
    - graph_structures
    - simulation_outputs
    - pattern_outputs
  produces:
    - instability_reports
    - volatility_signals
    - fragile_state_alerts

capabilities:
  - instability_detection
  - volatility_analysis
  - fragile_state_surfacing
  - oscillation_reporting

alignment:
  axioms_required: true
  canonical_structure: true
  interpretation_free_core: true

depends_on:
  - akasha-events
  - akasha-attractor
  - akasha-simulation

# ---- Canonical sections added by akasha-canon ----
type: organ

family: discovery

role: instability

